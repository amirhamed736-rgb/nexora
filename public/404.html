<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
      body { margin:0; min-height:100vh; display:grid; place-items:center; background:#070a0f; color:#e8f0fa; }
      .card { padding:2rem; text-align:center; border:1px solid #1a2433; border-radius:16px; background:rgba(10,14,20,.95); }
      a { color:#00ff9d; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>404 - Page Not Found</h1>
      <p>The requested page could not be found.</p>
      <p><a href="/">Return to the dashboard</a></p>
    </div>
  </body>
</html>
